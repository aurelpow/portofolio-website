<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Learning process illustration</title>
  <desc id="desc">An open notebook with a light bulb and trend arrow representing continuous learning and improvement.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1f7a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="400" height="400" rx="36" fill="url(#bg)"/>

  <rect x="70" y="125" width="260" height="180" rx="16" fill="url(#paper)"/>
  <line x1="200" y1="125" x2="200" y2="305" stroke="#c7d2fe" stroke-width="3"/>

  <line x1="95" y1="165" x2="180" y2="165" stroke="#a5b4fc" stroke-width="6" stroke-linecap="round"/>
  <line x1="95" y1="190" x2="175" y2="190" stroke="#c7d2fe" stroke-width="6" stroke-linecap="round"/>
  <line x1="95" y1="215" x2="170" y2="215" stroke="#c7d2fe" stroke-width="6" stroke-linecap="round"/>

  <polyline points="220,250 245,225 270,235 305,195" fill="none" stroke="#f97316" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="305,195 290,195 305,180" fill="#f97316"/>

  <circle cx="200" cy="92" r="34" fill="#fcd34d"/>
  <rect x="188" y="122" width="24" height="14" rx="5" fill="#f59e0b"/>

  <line x1="200" y1="40" x2="200" y2="54" stroke="#fde68a" stroke-width="6" stroke-linecap="round"/>
  <line x1="165" y1="50" x2="174" y2="60" stroke="#fde68a" stroke-width="6" stroke-linecap="round"/>
  <line x1="235" y1="50" x2="226" y2="60" stroke="#fde68a" stroke-width="6" stroke-linecap="round"/>
</svg>
